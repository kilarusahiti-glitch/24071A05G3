<html>
<body>
<center>
<h2>Enter Event Details</h2>
<form action="http://localhost:8080/Myapp/EventServlet" method="post">

  <table>
    <tr>
      <td>Event Name:</td>
      <td><input type="text" name="eventname" size="25"></td>
    </tr>
    <tr>
      <td>Date:</td>
      <td><input type="text" name="date" size="25"></td>
    </tr>
    <tr>
      <td>Location:</td>
      <td><input type="text" name="location" size="25"></td>
    </tr>
    <tr>
      <td>Seats Available:</td>
      <td><input type="text" name="seats" size="25"></td>
    </tr>
  </table>

  <br>
  <input type="submit" value="Submit">

</form>
</center>
</body>
</html>
